# Configuration File
project:
  name: "telco-customer-churn-prediction"
  version: "1.0"

# Data Paths
paths:
  raw_data: data/raw/telco_churn.csv
  processed_data: data/processed/telco_churn_processed.csv
  features_data: data/features/telco_churn_features.csv
  models_dir: models/
  reports_dir: reports/

# MLflow Configuration
mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "telco_churn_experiments"
  model_name: "telco_churn_classifier"

# Training Configuration
training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5

# Models
models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: lbfgs

  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    random_state: 42

  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    random_state: 42
  
features:
  target_column: "Churn"
  drop_columns:
    - "customerID"
  categorical_columns:
    - gender
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
  numerical_columns:
    - tenure
    - MonthlyCharges
    - TotalCharges
    
# Logging & Output
logging:
  level: "INFO"
  log_file: "logs/training.log"

# App Settings (for Streamlit / API)
app:
  model_path: "models/xgb_churn_full_tuned.pkl"
  port: 8501
  host: "localhost"